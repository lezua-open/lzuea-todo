name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx electron-vite build

      - name: Package (portable)
        run: npx electron-builder --win portable --publish never

      - name: Find and list exe files
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem -Path . -Filter "*.exe" -Recurse
          Write-Output "Found exe files:"
          $exeFiles | ForEach-Object { Write-Output $_.FullName }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lzuea-todo-win
          path: .\release\*.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: lzuea-todo-win
          path: release

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
