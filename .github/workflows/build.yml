name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx electron-vite build

      - name: Package (portable)
        run: npx electron-builder --win portable --publish never

      - name: Find exe file
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path . -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            Write-Output "Found: $($exe.FullName)"
            Copy-Item $exe.FullName -Destination ".\LzueaTodo.exe"
          } else {
            Write-Output "No exe found"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lzuea-todo-win
          path: LzueaTodo.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: lzuea-todo-win

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: LzueaTodo.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
